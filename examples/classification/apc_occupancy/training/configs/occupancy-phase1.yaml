# Phase 1 Comprehensive Sweep v2: MantisV2 Frozen Embeddings + sklearn Classifiers
#
# Redesigned for maximum coverage — ~278 experiments across 3 GPUs.
#
# Findings from initial round:
#   - Context window is THE dominant factor (AUC: 0.56@1min → 0.84@241min)
#   - Layer choice is negligible (±0.01 AUC across L0-L5)
#   - MantisV2 only supports output_token="combined" (cls/mean fail)
#
# v5: Expanded sweep with more classifiers, channels, and context windows.
#   Unified sensor array with date-based label split.
#   Both CSVs concatenated into one continuous sensor timeline.
#   Context windows can cross the train/test boundary (sensor overlap allowed).
#   Labels are split by split_date — no label leakage.
#   Label convention: -1=unlabeled, 0=empty, 1=occupied.
#
#   Default split: Feb 17 (maximize train data)
#     Train labeled: 9,623 (Feb 10 07:37 ~ Feb 16 23:59)
#     Test labeled:  3,497 (Feb 17 00:00 ~ Feb 19 10:16)
#     Train:Test ratio ≈ 73:27
#
#   Context window boundary safety:
#     Train first labeled index: ~495 in unified array
#     Unlabeled sensor data (Feb 09 23:22 ~ Feb 10 07:36) IS available
#     as context — windows can reference unlabeled sensor rows.
#     ctx_before <= 495 → no train sample loss.
#
# 3 parallel sweep groups (A/B/C):
#   GPU 1: Group A — Context Window Deep Exploration (~70 experiments)
#   GPU 2: Group B — Channel Ablation × Context (~100 experiments)
#   GPU 3: Group C — Classifier × Layer × Context (~108 experiments)
#   Total: ~278 experiments
#
# Usage:
#   cd examples/classification/apc_occupancy
#
#   # All groups (sequential)
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --device cuda
#
#   # Single group (parallel GPU servers)
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group A --device cuda
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group B --device cuda
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --group C --device cuda
#
#   # Override split date
#   python training/run_phase1_sweep.py --config training/configs/occupancy-phase1.yaml --split-date 2026-02-18 --device cuda

seed: 42
output_dir: results/phase1_sweep

# --- Model ---
model:
  pretrained_name: "paris-noah/MantisV2"

# --- Data (label-embedded CSVs) ---
# Generated by: python data/prepare_split.py --split-date 2026-02-17
# Source sensor: merged_processed_data_with_motion_count_0209_0223_interval1.csv
# Source events: occupancy_events_0210_0219_processed_with_none_cleaned.csv
# Binary: count >= 1 = Occupied, count = 0 = Empty, -1 = Unlabeled (excluded).
data:
  train_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_train_with_occupancy_label.csv"
  test_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_test_with_occupancy_label.csv"
  label_column: "occupancy_label"

# --- Split date ---
# Labeled data: Feb 10 07:37 ~ Feb 19 10:16 (9 days, ~13,120 labeled minutes)
# Feb 17 split: ~73% train / ~27% test — maximizes training data
# Override with --split-date CLI arg
split_date: "2026-02-17"

# --- Defaults (updated based on initial round best) ---
default_channels:
  - d620900d_motionSensor
  - 408981c2_contactSensor

# L2 was best at 201min (AUC=0.8391), used as default for Groups A & B
default_layer: 2
# Default context: 100+1+100 = 201min bidirectional (MAX_CONTEXT_AFTER=100)
default_context_before: 100
default_context_after: 100
stride: 1

# --- Classifiers (Group C) ---
# Expanded from 3 to 6 classifiers for comprehensive comparison:
#   random_forest, svm, nearest_centroid (original)
#   + logistic_regression, gradient_boosting, extra_trees (new)
classifiers:
  - random_forest
  - svm
  - nearest_centroid
  - logistic_regression
  - gradient_boosting
  - extra_trees

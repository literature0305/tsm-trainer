# Phase 2 Neural Classification Head Sweep v2: MantisV2 Frozen Embeddings
#
# v5: Expanded sweep with more augmentations, classifiers, and TTA combos.
#   Unified sensor array with date-based label split.
#   Both CSVs concatenated into one continuous sensor timeline.
#   Context windows can cross the train/test boundary (sensor overlap allowed).
#   Labels are split by split_date — no label leakage.
#   Label convention: -1=unlabeled, 0=empty, 1=occupied (unlabeled excluded).
#
# Default split: Feb 17 (maximize train data, ~73:27 ratio)
#   Train labeled: 9,623 (Feb 10 07:37 ~ Feb 16 23:59)
#   Test labeled:  3,497 (Feb 17 00:00 ~ Feb 19 10:16)
#
# Phase 1 findings (to update after Phase 1 v2 sweep):
#   - Context window is THE dominant factor (AUC: 0.56@1min → 0.84+@201min)
#   - Best channels: M+C+T1 (3ch) — dominant over M+C (2ch)
#   - Best context: ~201min bidirectional (100+1+100) — max symmetric
#   - Best layer: L2 (single), L2+L5 (fusion)
#   - Best sklearn: SVM_rbf → AUC≈0.986, EER≈0.047, Acc≈0.951
#   - Only output_token="combined" works in MantisV2
#   - Future context capped at MAX_CONTEXT_AFTER=100
#
# 6 sweep groups (D-I) across 3 GPU servers:
#   GPU 1: D + E — Augmentation × Head + Context Window (~360 exps)
#   GPU 2: F + G — Layer Fusion + Training Hyperparams (~188 exps)
#   GPU 3: H + I — Augmentation Deep Dive + TTA/Ensemble (~142 exps)
# Total: ~690 experiments.
#
# Usage:
#   cd examples/classification/apc_occupancy
#
#   # All groups (sequential, ~12-24h on single GPU)
#   python training/run_phase2_sweep.py --config training/configs/occupancy-phase2.yaml --device cuda
#
#   # 3-GPU parallel execution (recommended)
#   python training/run_phase2_sweep.py --config training/configs/occupancy-phase2.yaml --group D E --device cuda
#   python training/run_phase2_sweep.py --config training/configs/occupancy-phase2.yaml --group F G --device cuda
#   python training/run_phase2_sweep.py --config training/configs/occupancy-phase2.yaml --group H I --device cuda
#
#   # Override split date
#   python training/run_phase2_sweep.py --config training/configs/occupancy-phase2.yaml --split-date 2026-02-18 --device cuda

seed: 42
output_dir: results/phase2_sweep

# --- Model ---
model:
  pretrained_name: "paris-noah/MantisV2"
  output_token: "combined"

# --- Data (label-embedded CSVs) ---
# Generated by: python data/prepare_split.py --split-date 2026-02-17
# Source sensor: merged_processed_data_with_motion_count_0209_0223_interval1.csv
# Source events: occupancy_events_0210_0219_processed_with_none_cleaned.csv
# Binary: count >= 1 = Occupied, count = 0 = Empty, -1 = Unlabeled (excluded).
data:
  train_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_train_with_occupancy_label.csv"
  test_csv: "/group-volume/ts-dataset/AIHub/enter_leave/merged_processed_data_with_motion_count_0209_0223_interval1_test_with_occupancy_label.csv"
  label_column: "occupancy_label"

# --- Split date ---
# Labeled data: Feb 10 07:37 ~ Feb 19 10:16 (9 days, ~13,120 labeled minutes)
# Feb 17 split: ~73% train / ~27% test — maximizes training data
# Override with --split-date CLI arg
split_date: "2026-02-17"

# --- Defaults (from Phase 1 best: M+C+T1, 201min bidirectional, L2) ---
# NOTE: Future context capped at MAX_CONTEXT_AFTER=100 (deployment limit).
default_channels:
  - d620900d_motionSensor
  - 408981c2_contactSensor
  - d620900d_temperatureMeasurement

# Default: 100+1+100 = 201min bidirectional context (max symmetric)
default_context_before: 100
default_context_after: 100
# Phase 1 best single layer
default_layer: 2
stride: 1

# --- Training ---
training:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 0.01
  label_smoothing: 0.0
  early_stopping_patience: 30
  batch_size: 0  # 0=full-batch (default), >0=mini-batch (sweept in Group G)

# --- Phase 1 Reference (SVM baseline to beat) ---
# SVM_rbf: AUC≈0.9859, EER≈0.0470, Acc≈0.9509
# LogReg: AUC≈0.9838, EER≈0.0598, Acc≈0.9463
